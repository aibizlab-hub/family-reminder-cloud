name: Web Push Reminder

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min, 24/7; cron-expr change forces timer re-register
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: web-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install web-push
      - name: Send due reminders via Web Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ken851004-afk/family-reminder-cloud
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: node web-push-send.js
