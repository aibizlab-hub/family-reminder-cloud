name: Web Push Reminder

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min, 24/7; timer may be disabled by GitHub — see repository_dispatch fallback
  workflow_dispatch:
  repository_dispatch:
    types: [web-push-tick]

permissions:
  contents: write
  actions: write   # required so this run can re-arm the next run via gh workflow run

concurrency:
  group: web-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install web-push
      - name: Send due reminders via Web Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ken851004-afk/family-reminder-cloud
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: node web-push-send.js
      - name: Re-arm timer (self-perpetuate next run)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ken851004-afk/family-reminder-cloud
        run: |
          for i in 1 2 3; do
            if gh workflow run web-push.yml --ref "${{ github.ref_name }}"; then
              echo "✅ Re-armed web-push timer (attempt $i)"
              exit 0
            fi
            echo "⚠️ Re-arm attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::Failed to re-arm web-push timer after 3 retries"
          exit 1
